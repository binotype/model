name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: "Install dependencies"
        run: npm ci
      - name: "Lint"
        run: npm run lint

  build:
    name: "Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: "Install dependencies"
        run: npm ci
      - name: "Build"
        run: npm run build

  test:
    name: "Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: "Install dependencies"
        run: npm ci
      - name: "Test"
        run: npm run test

  audit:
    name: "Security Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: "Install dependencies"
        run: npm ci
      - name: "Security audit"
        run: npm audit --omit dev
