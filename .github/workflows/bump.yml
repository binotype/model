name: "Bump"

on:
  push:
    branches:
      - "master"

# Add explicit permissions
permissions:
  contents: write
  pull-requests: write
  actions: write # For creating releases/tags

jobs:
  bump-version:
    name: "Bump version on master"
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci: version bump to ')"

    steps:
      - name: "Checkout source code"
        uses: "actions/checkout@v4"
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0 # Fetch full history for tagging
      - name: "Setup Node"
        uses: "actions/setup-node@v4"
        with:
          node-version: "lts/*"
          cache: "npm"
      - name: "Install dependencies"
        run: npm ci
      - name: "Version Bump"
        id: version-bump
        uses: "phips28/gh-action-bump-version@v10.1.0" # Pinned version
        with:
          tag-prefix: "release-"
          default: "minor" # Default to minor version bump
          minor-wording: "feat,feature,minor"
          major-wording: "BREAKING CHANGE,major"
          patch-wording: "fix,patch,bugfix"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
