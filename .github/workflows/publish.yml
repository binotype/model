name: "Publish"

on:
  push:
    tags:
      - "release-*"
permissions:
  contents: read
  id-token: write # Required for OIDC
jobs:
  publish:
    name: "Publish"
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4 # v6 doesn't exist yet
        with:
          node-version: 24
          cache: "npm"
          registry-url: "https://registry.npmjs.org/"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --tag prerelease --provenance
          else
            npm publish --access public --provenance
          fi
        shell: bash
